<!DOCTYPE html>
<html>

<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JSFiddle ua4Lxb3c</title>

  <style>
    #score {
  text-align: center;
}

#game {
  width: 600px;
  height: 300px;
  border: 2px solid black;
  margin: auto;
  background-image: url('https://img.freepik.com/free-vector/cartoon-forest-landscape-endless-nature-background-computer-games-nature-tree-outdoor-plant-green-natural-environment-wood_1284-41524.jpg');
  background-size: cover;
  background-repeat: repeat-x; /* Bild horizontal wiederholen */
  
  /* Die neue Animation hinzufügen */
  animation: scrollBackground 10s linear infinite;
}

@keyframes scrollBackground {
  from {
    background-position: 0 0;
  }
  to {
    background-position: -600px 0; /* Entspricht der Breite deines Spielfelds */
  }}

#adler {
  height: 75px;
  width: 75px;
  top: 225px;
  position: relative;
  background-image: url('https://static.vecteezy.com/system/resources/thumbnails/070/257/013/small/majestic-bald-eagle-soaring-powerfully-with-wings-spread-wide-symbol-of-freedom-and-strength-png.png');
  background-size: cover;
}

#rock {
  width: 50px;
  height: 50px;
  position: relative;
  top: 175px;
  left: 550px;
  background-image: url('https://raw.githubusercontent.com/kriscfoster/chrome-dino-game/refs/heads/master/rock.png');
  background-size: cover;
  animation: rock 1.33s infinite;
  display: none;
}

.rock-animation {
  display: block !important;
  animation: rock 1.33s infinite linear;
}

#collision {
  width: 100px; /* Größe der Explosion */
  height: 100px;
  position: absolute;
  /* Standardmäßig unsichtbar */
  display: none;
  background-size: cover;
  background-repeat: no-repeat;
  z-index: 10; /* Ganz oben */

  /* ZENTRIEREN des Bildes am Kollisionspunkt (optional) */
  transform: translate(-50%, -50%);

  /* PLATZHALTER: Füge hier deine Bild-URL ein */
  background-image: url("https://png.pngtree.com/png-clipart/20220916/original/pngtree-retro-cartoon-explosion-png-image_8620539.png");
}

@keyframes rock {
  0% {
    left: 550px;
  }
  100% {
    left: -50px;
  }
}

.jump-animation {
  animation: jump 0.75s;
}

@keyframes jump {
  0% {
    top: 225px;
  }
  50% {
    top: 75px;
  }
  // 75% ausgeblendet, damit die Bewegung nach oben und nach unten genau gleich weit/lang sind
  /* 75% {
    top: 75px;
  } */
  100% {
    top: 225px;
  }
}

  </style>

  
</head>
<body>
  <!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>adler Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="game">
      <div id="adler"></div>
      <div id="rock"></div>
      <div id="collision"></div>
    </div>

    <div style="text-align: center; margin-top: 20px;">
      <button id="startBtn">Spiel Starten</button>
    </div>

    <h1 id="score">0</h1>
    <script src="script.js"></script>
  </body>
</html>


  <script>
    const adler = document.getElementById("adler");
const rock = document.getElementById("rock");
const scoreElement = document.getElementById("score");
const startBtn = document.getElementById("startBtn"); // Variable für Button

let gameRunning = false; // Status-Variable

// Event Handler für den Klick
startBtn.addEventListener("click", () => {
    console.log("Start Button wurde geklickt!");
    if (!gameRunning) {
        startGame();
    }
});

function startGame() {
    gameRunning = true;
    startBtn.style.display = "none"; // Button verstecken, wenn Spiel läuft
    
    // Animation für den Stein aktivieren
    rock.classList.add("rock-animation");

    // Das Intervall für Score und Kollision starten
    let checkDead = setInterval(() => {
        const adlerTop = parseInt(window.getComputedStyle(adler).getPropertyValue("top"));
        const rockLeft = parseInt(window.getComputedStyle(rock).getPropertyValue("left"));

        // Score zählt nur hoch, wenn das Spiel läuft
        scoreElement.innerText = parseInt(scoreElement.innerText) + 1;

        // Kollisionsprüfung
        if (rockLeft < 50 && rockLeft > 0 && adlerTop > 150) {
            rock.classList.remove("rock-animation"); // Animation stoppen
            gameRunning = false;
            clearInterval(checkDead); // Intervall beenden
            alert("Game Over! Score: " + scoreElement.innerText);
            location.reload();
        }
    }, 50);
}

// Jump-Funktion (nur erlaubt, wenn das Spiel läuft)
function jump() {
    if (gameRunning && !adler.classList.contains("jump-animation")) {
        adler.classList.add("jump-animation");
        setTimeout(() => adler.classList.remove("jump-animation"), 500);
    }
}

document.addEventListener("keypress", (event) => {
    jump();
});
  </script>
</body>
</html>
